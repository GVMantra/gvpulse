name: GV-Pulse Workflow

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]
  push:
    branches:
      - develop

jobs:
  auto_merge:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: gv-pulse-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Auto Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --delete-branch \
            --repo ${{ github.repository }}

  deploy_develop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gv-pulse-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout Repository (Full History + Tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Authenticate Org
        shell: bash
        run: |
          echo "${{ secrets.GV_PULSE_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias Gv_Pulse
          sf org list

      - name: Determine Base Ref for Delta
        id: base_ref
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/last-successful-deploy" >/dev/null; then
            BASE=$(git rev-parse refs/tags/last-successful-deploy)
          else
            BASE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Generate Delta Package
        run: |
          mkdir delta
          sf sgd source delta \
            --from ${{ steps.base_ref.outputs.base }} \
            --to HEAD \
            --output-dir delta

      - name: Detect Changes Type
        id: change_detector
        shell: bash
        run: |
          if grep -q "<types>" delta/package/package.xml; then
            echo "constructive=true" >> $GITHUB_OUTPUT
          else
            echo "constructive=false" >> $GITHUB_OUTPUT
          fi

          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ] && grep -q "<types>" delta/destructiveChanges/destructiveChanges.xml; then
            echo "destructive=true" >> $GITHUB_OUTPUT
          else
            echo "destructive=false" >> $GITHUB_OUTPUT
          fi

      # Case 1: Both Constructive AND Destructive Changes Exist (Uses delta manifest)
      - name: Execute Combined Deploy (Additions + Deletions)
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Pulse \
            --wait 60

      # Case 2: Constructive updates ONLY (No deletions). Safe to use whole branch source-dir to catch up.
      # VERIFIED: Uses --source-dir force-app to push the whole branch
      - name: Execute Whole Branch Deploy Only
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'false'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org Gv_Pulse \
            --wait 60

      # Case 3: Destructive ONLY changes (no new or modified files).
      - name: Execute Destructive Only Delta Deployment
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Pulse \
            --wait 60

      - name: No Changes Detected
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'false'
        run: |
          echo "INFO: No Salesforce metadata changes or deletions detected. Skipping deployment."

      - name: Update Last Successful Deploy Marker
        if: success()
        run: |
          git tag -f last-successful-deploy HEAD
          git push origin refs/tags/last-successful-deploy --force

      - name: Notify on Deploy Failure
        if: failure()
        run: |
          echo "🚨 CRITICAL ERROR: Deploy to Gv_Pulse failed after merge!"
          echo "The develop branch and the target Salesforce Org are now OUT OF SYNC."
